services:
  master:
    image: postgres:17
    container_name: master
    environment:
      POSTGRES_DB: "db_store"
      POSTGRES_USER: "db_practice_umarrina"
      POSTGRES_PASSWORD: "f73aml4k9"
    ports:
      - "5434:5432"
    volumes:
      - ./master_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - listen_addresses=*

  replica1:
    image: postgres:17
    container_name: replica1
    environment:
      POSTGRES_DB: "db_store"
      POSTGRES_USER: "db_practice_umarrina"
      POSTGRES_PASSWORD: "f73aml4k9"
    ports:
      - "5435:5432"
    volumes:
      - ./replica1_data:/var/lib/postgresql/data
    depends_on:
      - master
    command:
      - postgres
      - -c
      - primary_conninfo=host=master port=5432 user=replicator password=rep_pass
      - -c
      - primary_slot_name=replica1_slot

  replica2:
    image: postgres:17
    container_name: replica2
    environment:
      POSTGRES_DB: "db_store"
      POSTGRES_USER: "db_practice_umarrina"
      POSTGRES_PASSWORD: "f73aml4k9"
    ports:
      - "5436:5432"
    volumes:
      - ./replica2_data:/var/lib/postgresql/data
    depends_on:
      - master
    command:
      - postgres
      - -c
      - primary_conninfo=host=master port=5432 user=replicator password=rep_pass
      - -c
      - primary_slot_name=replica2_slot

  logical_subscriber:
    image: postgres:17
    container_name: logical_subscriber
    environment:
      POSTGRES_DB: "subscriber_db"
      POSTGRES_USER: "subscriber"
      POSTGRES_PASSWORD: "sub_pass"
    ports:
      - "5437:5432"
    volumes:
      - ./subscriber_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
