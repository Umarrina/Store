services:
  influxdb:
    image: influxdb:2.7
    container_name: ${INFLUX_CONTAINER:-influx-lab}
    ports:
      - "${INFLUX_PORT:-8086}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-admin123456}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-myorg}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-mybucket}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-my-token-123}
    volumes:
      - influxdb-data:/var/lib/influxdb
volumes:
  influxdb-data: